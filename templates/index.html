<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Resizer — Compress Images Instantly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --background: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* App Container */
        .app-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 440px;
            width: 100%;
            border: 1px solid var(--border);
        }

        /* Typography */
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 28px 0;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: left;
        }

        /* Styled File Upload Area */
        .file-upload-wrapper {
            border: 2px dashed #C7D2FE;
            padding: 24px;
            border-radius: 12px;
            background-color: #F5F7FF;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
            position: relative;
        }

        .file-upload-wrapper:hover {
            border-color: var(--primary);
            background-color: #EEF2FF;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .upload-text {
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }

        .file-info {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Hidden raw file input */
        input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Size Input Box */
        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .size-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            font-family: inherit;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .unit-badge {
            position: absolute;
            right: 16px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Premium Action Button */
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Ad Placement Area at Bottom */
        .ad-container {
            background-color: #FFFFFF;
            border-top: 1px solid var(--border);
            padding: 12px 0;
            text-align: center;
            width: 100%;
            min-height: 50px; /* Standard Mobile Banner Height */
        }

        .ad-placeholder {
            font-size: 10px;
            color: #9CA3AF;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="container">
        <h1>Smart Resizer</h1>
        <p class="subtitle">Compress photos perfectly for official job & exam portals.</p>
        
        <form action="/resize" method="POST" enctype="multipart/form-data">
            
            <label>Upload Image</label>
            <div class="file-upload-wrapper">
                <span class="upload-icon">📁</span>
                <span class="upload-text" id="file-label">Tap to select photo</span>
                <div class="file-info">Supports JPEG, JPG, PNG</div>
                <input type="file" name="photo" accept="image/*" id="file-input" required onchange="updateFileName()">
            </div>
            
            <div class="input-group">
                <label for="size_kb">Target Max Size</label>
                <div class="size-input-wrapper">
                    <input type="number" id="size_kb" name="size_kb" value="50" min="5" max="500" required>
                    <span class="unit-badge">KB</span>
                </div>
            </div>
            
            <button type="submit">Compress & Download</button>
        </form>
    </div>
</div>

<div class="ad-container">
    <div class="ad-placeholder">Advertisement</div>
    <div id="banner-ad-box">
        <p style="margin:0; color:#D1D5DB; font-size:12px;">Banner Ad Slot</p>
    </div>
</div>

<script>
    // Visual improvement: Shows the actual filename when selected
    function updateFileName() {
        const input = document.getElementById('file-input');
        const label = document.getElementById('file-label');
        if (input.files.length > 0) {
            label.textContent = input.files[0].name;
            label.style.color = "#111827";
        }
    }
</script>

</body>
</html>
